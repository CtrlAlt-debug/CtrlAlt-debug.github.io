<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ctrl Alt Debug - Tech Blog</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-container">
                <div class="logo">
                    <h1>Ctrl Alt Debug</h1>
                    <span class="tagline">Tech insights & debugging adventures</span>
                </div>
                <div class="nav-links">
                    <button class="theme-toggle" id="themeToggle">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="container">
            <div class="hero">
                <h2 class="hero-title">Welcome to the Debug Zone</h2>
                <p class="hero-subtitle">Exploring the depths of code, one bug at a time</p>
            </div>

            <div class="content">
                <div class="posts-grid" id="postsGrid">
                    <!-- Posts will be dynamically loaded here -->
                </div>
                
                <div class="post-detail" id="postDetail" style="display: none;">
                    <button class="back-btn" id="backBtn">← Back to Posts</button>
                    <article class="post-content" id="postContent">
                        <!-- Individual post content will be loaded here -->
                    </article>
                    <div class="comments-section" id="commentsSection">
                        <!-- Comments will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Ctrl Alt Debug. Built with ❤️ and lots of coffee.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
